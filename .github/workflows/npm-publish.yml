name: Publish NPM Package

on:
  push:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-beta:
    if: ${{ github.event_name == 'push' }}
    runs-on: windows-latest
    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install MCP server dependencies
        working-directory: mcp-server
        run: npm ci

      - name: Compute beta snapshot version
        id: version
        working-directory: mcp-server
        run: |
          npm run version:beta
          $package = Get-Content package.json | ConvertFrom-Json
          if ($package.version -notmatch '-') {
            throw "Expected a prerelease snapshot version, got '$($package.version)'."
          }
          "version=$($package.version)" >> $env:GITHUB_OUTPUT

      - name: Build npm package tarball
        id: pack
        working-directory: mcp-server
        run: |
          npm pack | Tee-Object -FilePath pack-output.txt
          $tarball = Get-Content pack-output.txt | Where-Object { $_ -match '\.tgz$' } | Select-Object -Last 1
          if (-not $tarball) {
            throw 'npm pack did not produce a tarball filename.'
          }
          "tarball=$tarball" >> $env:GITHUB_OUTPUT

      - name: Upload beta package artifact
        uses: actions/upload-artifact@v4
        with:
          name: solidworks-mcp-beta-${{ steps.version.outputs.version }}
          path: mcp-server/${{ steps.pack.outputs.tarball }}
          if-no-files-found: error

      - name: Publish beta package to npm
        working-directory: mcp-server
        run: npm publish "${{ steps.pack.outputs.tarball }}" --access public --tag beta

  publish-release:
    if: ${{ github.event_name == 'release' }}
    runs-on: windows-latest
    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install MCP server dependencies
        working-directory: mcp-server
        run: npm ci

      - name: Ensure pending changesets exist
        working-directory: mcp-server
        run: |
          $changesets = Get-ChildItem .changeset -Filter *.md -File | Where-Object { $_.Name -ne 'README.md' }
          if (-not $changesets) {
            throw 'No pending changeset files found. Add a changeset before publishing a stable release.'
          }

      - name: Apply release version from changesets
        id: version
        working-directory: mcp-server
        run: |
          npm run version:release
          $package = Get-Content package.json | ConvertFrom-Json
          $tag = '${{ github.event.release.tag_name }}'
          $version = $tag -replace '^v', ''
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Release tag '$tag' must be a stable semver like v1.2.3."
          }

          if ($package.version -ne $version) {
            throw "Release tag '$tag' does not match Changesets-computed version '$($package.version)'."
          }

          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build npm package tarball
        id: pack
        working-directory: mcp-server
        run: |
          npm pack | Tee-Object -FilePath pack-output.txt
          $tarball = Get-Content pack-output.txt | Where-Object { $_ -match '\.tgz$' } | Select-Object -Last 1
          if (-not $tarball) {
            throw 'npm pack did not produce a tarball filename.'
          }
          "tarball=$tarball" >> $env:GITHUB_OUTPUT

      - name: Upload release package artifact
        uses: actions/upload-artifact@v4
        with:
          name: solidworks-mcp-release-${{ steps.version.outputs.version }}
          path: mcp-server/${{ steps.pack.outputs.tarball }}
          if-no-files-found: error

      - name: Publish release package to npm
        working-directory: mcp-server
        run: npm publish "${{ steps.pack.outputs.tarball }}" --access public --tag latest