name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  mcp-server:
    runs-on: windows-latest
    defaults:
      run:
        shell: powershell
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build .NET MCP server
        run: dotnet build --configuration Release --nologo

      - name: Test .NET MCP server
        run: dotnet test --no-build --configuration Release --nologo