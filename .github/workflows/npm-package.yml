name: Package NPM Tarball

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: npm-package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pack:
    runs-on: windows-latest
    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install MCP server dependencies
        working-directory: mcp-server
        run: npm ci

      - name: Build npm package tarball
        id: pack
        working-directory: mcp-server
        run: |
          $pack = npm pack --json | ConvertFrom-Json
          $tarball = $pack[0].filename
          "tarball=$tarball" >> $env:GITHUB_OUTPUT

      - name: Upload npm package artifact
        uses: actions/upload-artifact@v4
        with:
          name: solidworks-mcp-package-${{ github.sha }}
          path: mcp-server/${{ steps.pack.outputs.tarball }}
          if-no-files-found: error